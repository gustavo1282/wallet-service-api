name: Pipeline > wallet-service-api

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # JOB 1: BUILD, TEST & CODE QUALITY (SONAR)
  # -------------------------------------------------------------------------
  build_verify_analyze:
    name: Build, Test & Sonar (Java 21)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout (full history for Sonar)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Maven Build & Verify
        run: |
          ./mvnw -B -V -T 1C verify \
            -DfailIfNoTests=false \
            -Dsurefire.useFile=false

      - name: Cache Sonar
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Analyze (Sonar)
        # Só executa se o token estiver configurado (evita quebra em PRs externos)
        if: env.SONAR_TOKEN != null
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  # -------------------------------------------------------------------------
  # JOB 2: DOCKER SECURITY & DELIVERY (LOCAL OU REMOTO)
  # -------------------------------------------------------------------------
  docker:
    name: Docker Security & Delivery
    runs-on: ubuntu-latest
    needs: [build_verify_analyze]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1️⃣ Build Único para Scan (Independente do ambiente)
      - name: Build for Security Scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true 
          tags: wallet-service-api:test-scan
          cache-from: type=gha

      # 2️⃣ Scan de Segurança (Trivy)
      # Se houver vulnerabilidade CRITICAL, o pipeline para aqui
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'wallet-service-api:test-scan'
          format: 'table'
          exit-code: '1' 
          severity: 'CRITICAL,HIGH'

      # 3️⃣ ENTREGA LOCAL (Apenas via ACT / Docker Desktop)
      - name: Delivery to Docker Desktop (Local)
        if: ${{ env.ACT == 'true' }}
        run: |
          docker tag wallet-service-api:test-scan wallet-service-api:latest
          echo "🚀 Sucesso! Imagem 'wallet-service-api:latest' disponível no seu Docker Desktop."

      # 4️⃣ ENTREGA REMOTA (Apenas GitHub Real + Branch Main)
      - name: Login to GHCR
        if: ${{ env.ACT != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to Registry (Prod)
        if: ${{ env.ACT != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/wallet-service-api:latest
            ghcr.io/${{ github.repository }}/wallet-service-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max