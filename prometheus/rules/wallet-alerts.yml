groups:
  - name: infrastructure-availability-alerts
    rules:
      # --- ALERTA GENÉRICO PARA QUALQUER SERVIÇO DA STACK ---
      # Este alerta dispara se qualquer job definido no seu prometheus.yml ficar 'down'
      - alert: InfrastructureServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          env: "env-local"
        annotations:
          summary: "Serviço Crítico Indisponível: {{ $labels.job }}"
          description: "O serviço {{ $labels.job }} (instância {{ $labels.instance }}) está fora do ar há mais de 2 minutos."

  - name: wallet-service-performance-alerts
    rules:
      # --- ALERTA ESPECÍFICO PARA A APLICAÇÃO (LATÊNCIA) ---
      - alert: WalletApiHighLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{application="wallet-service-api"}[5m]))) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Latência Alta na Wallet API"
          description: "95% das requisições estão demorando mais de 2s (Valor atual: {{ $value | printf \"%.2f\" }}s)."

      # --- ALERTA DE ERROS NA API ---
      - alert: WalletApiHighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{application="wallet-service-api", status=~"5.."}[5m])) 
          / 
          sum(rate(http_server_requests_seconds_count{application="wallet-service-api"}[5m])) > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Taxa de Erro 5xx elevada na Wallet API"
          description: "A API está com mais de 10% de erros 5xx (Atual: {{ $value | printf \"%.2f\" }}%)."

  - name: database-alerts
    rules:
      # --- ALERTA DE CONEXÕES NO POSTGRES ---
      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count{application="postgres"} > 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres próximo ao limite de conexões"
          description: "O Postgres está com {{ $value }} conexões. O limite configurado no seu compose é 20."