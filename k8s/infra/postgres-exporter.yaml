apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
spec:
  type: NodePort
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
spec:
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        env:
          - name: DATA_SOURCE_NAME
            value: "postgresql://wallet_user:wallet_pass@postgres:5432/wallet_db?sslmode=disable"
