apiVersion: v1
kind: Service
metadata:
  name: wallet-api
spec:
  type: NodePort
  selector:
    app: wallet-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: wallet-api
  template:
    metadata:
      labels:
        app: wallet-api
    spec:
      containers:
      - name: wallet-api
        image: wallet-service-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        
        # 1. Limites de Recursos para nÃ£o travar o Docker Desktop
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1024Mi"
            cpu: "500m"

        # 2. Health Checks AutomÃ¡ticos (Spring Actuator)
        startupProbe:
          httpGet:
            path: /wallet-service-api/actuator/health/liveness
            port: 8080
          periodSeconds: 10
          failureThreshold: 60
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /wallet-service-api/actuator/health/liveness
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 15
          failureThreshold: 6
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /wallet-service-api/actuator/health/readiness
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 12
          timeoutSeconds: 2

        env:
          - name: SPRING_PROFILES_ACTIVE
            value: "k8s"
          - name: APP_SEEDER_ENABLED
            value: "true"

          # JWT via Vault (v2):
          # path esperado: secret/data/wallet-service-api/ks8
          # chave esperada: jwt.secret
          # - name: JWT_SECRET
          #   value: "jwt_token.local.k8s.kind.7d2A9b3E5f1H4k"
           
          # Banco de Dados
          # Datasource via Vault (v2):
          # chaves esperadas: spring.datasource.url|username|password
          # - name: SPRING_DATASOURCE_URL
          #   value: "jdbc:postgresql://postgres:5432/wallet_db"
          # - name: SPRING_DATASOURCE_USERNAME
          #   value: "wallet_user"
          # - name: SPRING_DATASOURCE_PASSWORD
          #   value: "wallet_pass"
          
          # Vault
          - name: SPRING_CLOUD_VAULT_URI
            value: "http://vault:8200"
          - name: SPRING_CONFIG_IMPORT
            value: "optional:classpath:security-matchers.yml,optional:vault://"
          - name: SPRING_CLOUD_VAULT_APPLICATION_NAME
            value: "wallet-service-api"
          - name: SPRING_CLOUD_VAULT_KV_ENABLED
            value: "true"
          - name: SPRING_CLOUD_VAULT_KV_BACKEND
            value: "secret"
          - name: SPRING_CLOUD_VAULT_KV_DEFAULT_CONTEXT
            value: "wallet-service-api"
          - name: SPRING_CLOUD_VAULT_TOKEN
            value: "root"
          - name: SPRING_CLOUD_VAULT_KV_PROFILES
            value: "ks8"
          - name: SPRING_CLOUD_VAULT_KV_PROFILE_SEPARATOR
            value: "/"

          # Observabilidade
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://otel-collector:4318"
          - name: OTEL_SERVICE_NAME
            value: "wallet-service-api"
          # Adicionado para garantir logs no formato certo
          - name: LOGGING_LEVEL_ROOT
            value: "INFO"
