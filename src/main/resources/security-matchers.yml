security:
  access-levels:
    # CAMADA 1: Acesso Total (Sem Token)
    public-paths:
      # Negócio (Exceções)
      - "/h2-console"
      - "/h2-console/**"
      - "/api/v1/auth/**"
      - "/api/v1/params/list"
      # Observabilidade (Básica)
      #- "/actuator/health"
      #- "/actuator/info"
      #- "/actuator/prometheus"
      #- "/actuator/metrics"
      - "/actuator/**"        # Todos os outros dados sensíveis do Actuator
      - "/api/v1/alerts/**"

    documentation:
      # Documentação
      - "/swagger-ui/**"
      - "/swagger-ui.html"
      - "/v3/api-docs/**"
      - "/swagger-resources/**"
      - "/webjars/**"

    # CAMADA 2: Autenticado (USER ou ADMIN)
    secured:
      - "/api/v1/customers/**"
      - "/api/v1/wallets/**"
      - "/api/v1/transactions/**"
      - "/api/v1/wallet-operator/**"
      - "/api/v1/auth/my_profile"


    # CAMADA 3: Restrito (Somente ADMIN)
    admin:
      - "/api/v1/params-app/**"    # Tudo de params EXCETO o /list que já saiu na Camada 1