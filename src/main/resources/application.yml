app:
  api-prefix: /api/v1

server:
  servlet:
    context-path: /${APP_NAME}

spring:
  application:
    name: ${APP_NAME}
  config:
    import: 
      - vault://
      - "optional:classpath:security-matchers.yml"
  cloud:
    vault:
      enabled: true
      authentication: TOKEN
      kv:
        enabled: true
        backend: secret
        default-context: ${APP_NAME}
        profile-separator: /
  data:
    web:
      pageable:
        default-page-size: 25
        max-page-size: 150
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        default_schema: public
        "[format_sql]": true
        "[use_sql_comments]": true
        jdbc:
          "[batch_size]": 1000
        "[order_inserts]": true
        "[order_updates]": true
        jdbc.batch_versioned_data: true
  #mvc:
    #servlet:
      #path: /api/v1

springdoc:
  paths-to-match: '/api/v1/**'
  api-docs:
    path: /v3/api-docs
  info:
    title: Wallet Service API
    description: |
      Documentação da API de Carteira de Clientes.

      ---

      ### 🔑 Autenticação (A partir da v0.2.4)

      A autenticação agora utiliza **JSON Web Tokens (JWT)**. Para acessar os endpoints protegidos, siga os passos abaixo:

      1.  **Obter o Token:**
          * Execute o endpoint de login: **`POST /api/auth/login`**.
          * Use suas credenciais de usuário e senha no corpo da requisição (Request Body).

      2.  **Autorizar o Swagger (OpenAPI):**
          * Copie o **token JWT** retornado no campo `access_token`.
          * Clique no botão **"Authorize"** (Autorizar) no topo da página.
          * Cole o token no campo de autenticação (Geralmente no formato **`Bearer SeuTokenAqui`**).

      3.  **Executar Métodos:**
          * Com o token configurado no Swagger, você pode executar todos os métodos protegidos.

      ---

      **Credenciais de Teste:**
      * **Usuário:** `wallet_user`
      * **Senha:** `wallet_pass`
  swagger-ui:
    path: /swagger-ui.html
    groups-order: ASC
    operationsSorter: alpha
    try-it-out-enabled: 'false'
  show-actuator: true
  writer-with-default-pretty-printer: true
  use-root-path: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,loggers,prometheus,metrics,caches,cache,threaddump,httpexchanges,env"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  observations:
    key-values:
      application: ${APP_NAME}
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    logging:
      endpoint: ${MANAGEMENT_OTLP_LOGGING_ENDPOINT:http://localhost:4318/v1/logs}
      timeout: 10s
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
      timeout: 10s
    metrics:
      export:
        enabled: false
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
    enable:
      process: true
      jvm: true
    tags:
      application: ${APP_NAME}
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    skip-pattern: /actuator/**, /swagger-ui/**, /v3/api-docs/**

logging:
  file:
    name: logs/${APP_NAME}.log
  exception-conversion-word: "%wEx{5}"
  level:
    root: INFO
    com.guga.walletserviceapi: TRACE
    org.springframework.boot.context.config: TRACE
    org.springframework.core.env: TRACE
    org.hibernate: INFO
    org.hibernate.engine.jdbc.env: DEBUG
    org.springframework.cloud.vault: DEBUG
    org.springframework.vault: DEBUG
    org.springframework.security: TRACE
    org.springdoc: INFO

    #root: DEBUG
    #org.hibernate: INFO
    #org.hibernate.engine.jdbc.env: DEBUG
    #org.springframework: INFO
    #org.springframework.core.env: TRACE
    #org.springframework.boot.context.config: TRACE