spring:
  cloud:
    vault:
      enabled: false
      uri: http://localhost:8200
      token: root
    bootstrap:
      enabled: false
      
  datasource:
    driver-class-name: org.postgresql.Driver

  security:
    user:
      name: ${USER_NAME:wallet_user}
      password: ${USER_PASSWORD:wallet_pass}
      roles:
        - ADMIN
        - USER

