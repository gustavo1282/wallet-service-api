spring:
  config:
    import: 
      - "optional:classpath:security-matchers.yml"
      - "optional:vault://v1/secret/data/${APP_NAME}/${PROFILE}"
  cloud:
    vault:
      enabled: false
      #uri: http://localhost:8200
      #authentication: TOKEN
      #token: root
      #scheme: http
      #kv:
      #  enabled: true
      #  backend: secret
      #  version: 2
      #  #authentication: TOKEN
      #  default-context: wallet-service-api
      #  profiles: ${PROFILE:dev}
    #bootstrap:
    #  enabled: false
      
  datasource:
    # Configuração para H2 via arquivo
    #url: jdbc:h2:mem:wallet-test-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    url: jdbc:h2:file:./data/h2/wallet-test-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: ${WALLET_USER:wallet_user}
    password: ${WALLET_PASS:wallet_pass}
    
    # Configuração para POSTGRES via arquivo
    #url: jdbc:postgresql://host.docker.internal:5432/wallet_db
    #driver-class-name: org.postgresql.Driver
    #username: wallet_user
    #password: wallet_pass

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  security:
    user:
      name: ${WALLET_USER:wallet_user}
      password: ${WALLET_PASS:wallet_pass}
      roles:
        - ADMIN
        - USER
