spring:
  cloud:
    vault:
      enabled: false

  datasource:
    url: jdbc:h2:mem:wallet-test-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true

management:
  endpoints:
    enabled-by-default: false

logging:
  level:
    root: WARN

