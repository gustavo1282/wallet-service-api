# =========================
# Vars usadas por placeholders (bootstrapping)
# =========================
APP_NAME: wallet-service-api
PROFILE: test
ENV: env-test
WALLET_USER: wallet_user
WALLET_PASS: wallet_pass

# Se sua app usa ${JWT_SECRET} diretamente em algum lugar, isso garante o valor em testes
JWT_SECRET: mock.jwt_secret_value_8235hu23523h523h57823h58723h823

###############################
###############################
###############################
###############################


app:
  api-prefix: /api/v1

server:
  servlet:
    context-path: /${APP_NAME}

spring:
  autoconfigure:
    exclude:
      # --- REDIS
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      # --- REDIS (Evita busca por servidor Redis e criação de Repositories) ---
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      # --- OBSERVABILIDADE (O "Sonar" das métricas que vimos travar seu log) ---
      - org.springframework.boot.actuate.autoconfigure.logging.OpenTelemetryLoggingAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.observation.ObservationAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.tracing.MicrometerTracingAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.tracing.OpenTelemetryTracingAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.opentelemetry.OpenTelemetryAutoConfiguration
      # --- COUCHBASE (Se ainda estiver no seu pom.xml e causando o "Strict Mode") ---
      - org.springframework.boot.autoconfigure.data.couchbase.CouchbaseDataAutoConfiguration
      # --- VAULT
      - org.springframework.cloud.vault.config.VaultAutoConfiguration
      - org.springframework.cloud.vault.config.VaultReactiveAutoConfiguration

  cloud:
    vault:
      enabled: false
    bootstrap:
      enabled: false

  config:
    import: 
      - "optional:classpath:security-matchers.yml"
      - "optional:vault://secret/wallet-service-api/local"

  datasource:
    #url: jdbc:h2:mem:wallet-test-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    url: jdbc:h2:file:./data/h2/wallet-test-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: ${WALLET_USER:wallet_user}
    password: ${WALLET_PASS:wallet_pass}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: "*"
        #include: "startup,health,info,loggers,prometheus,metrics,caches,cache,threaddump,httpexchanges,env"
      base-path: /actuator 
  otlp:
    logging:
      endpoint: ${MANAGEMENT_OTLP_ENDPOINT}/logs
      timeout: 90s
    tracing:
      endpoint: ${MANAGEMENT_OTLP_ENDPOINT}/traces
      timeout: 90s
    metrics:
      export:
        enabled: false

logging:
  file:
    name: logs/${APP_NAME:wallet-service-api}-test.log
  exception-conversion-word: "%wEx{5}"
  level:
    root: INFO
    com.guga.walletserviceapi: DEBUG
    org.springframework.boot.context.config: TRACE
    org.springframework.core.env: INFO
    org.hibernate: INFO
    #org.hibernate.engine.jdbc.env: INFO
    org.springframework.cloud.vault: INFO
    org.springframework.vault: INFO
    #org.springframework.security: INFO
    #org.springdoc: INFO
    org.springframework.web.servlet.handler.AbstractHandlerMapping: DEBUG    
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: TRACE
    org.springframework.boot.StartupInfoLogger: DEBUG
    org.springframework.context.support.PostProcessorRegistrationDelegate: DEBUG

    org.springframework.context.support: DEBUG
    org.springframework.beans.factory.support: DEBUG


  # Recomendado: evita quebrar se APP_NAME não existir por algum motivo

# Se você usa config do tipo jwt.secret no código/config:
jwt:
  secret: "${JWT_SECRET}"
