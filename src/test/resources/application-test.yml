# ===================================================================
# APPLICATION-TEST.YML - AMBIENTE DE TESTE / DESENVOLVIMENTO LOCAL
# Prioridade de Resolução: 
# 1. vmArgs (-Dspring.jmx.enabled=false)
# 2. env (Variaveis do launch.json)
# 3. Valores default abaixo (:valor)
# ===================================================================

app:
  api-prefix: ${API_PREFIX:/api/v1}
  security:
    crypto:
      strength: 4
  seeder:
    enabled: true
  test.anyauthlogin.enabled: true

server:
  port: 0 # Porta aleatória para evitar conflitos de 'Address already in use'

spring:
  main:
    allow-bean-definition-overriding: true
    lazy-initialization: false 

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.logging.OpenTelemetryLoggingAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.observation.ObservationAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.tracing.MicrometerTracingAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.tracing.OpenTelemetryTracingAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.opentelemetry.OpenTelemetryAutoConfiguration
      - org.springframework.boot.autoconfigure.data.couchbase.CouchbaseDataAutoConfiguration
      - org.springframework.cloud.vault.config.VaultAutoConfiguration
      - org.springframework.cloud.vault.config.VaultReactiveAutoConfiguration

  cloud:
    vault:
      enabled: false # DESATIVADO: Evita travamento por falta de Telepresence
    bootstrap:
      enabled: false

  config:
    import: 
      - "optional:classpath:security-matchers.yml"
      # SINALIZADO: Import de Vault comentado para garantir execução offline
      # - "optional:vault://secret/wallet-service-api/local" 

  datasource:
    # PADRONIZADO: Uso de H2 para independência total de infraestrutura externa
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:wallet_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""

  h2:
    console:
      enabled: false 

  jmx:
    enabled: false # DESATIVADO: Elimina exceções de RMI/JMX no console da IDE

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop 
    show-sql: true
    properties:
      hibernate.format_sql: true

  sql:
    init:
      mode: always

management:
  endpoints:
    enabled-by-default: false 
    jmx:
      exposure:
        exclude: "*" 
  otlp:
    logging:
      enabled: false
    tracing:
      enabled: false
    metrics:
      export:
        enabled: false
  observations:
    enabled: false # DESATIVADO: Remove overhead de telemetria nos testes

logging:
  level:
    root: INFO
    com.guga.walletserviceapi: DEBUG
  file:
    # Resolve APP_NAME do launch.json ou usa o default
    name: logs/${APP_NAME:wallet-service-api}-test.log

jwt:
  # Resolve JWT_SECRET do launch.json ou usa o mock de teste
  secret: "${JWT_SECRET:mock.jwt_token.profile_test.859jg89045j9045i}"
