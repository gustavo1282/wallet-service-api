
x-configs: &wallet-variables
  JWT_SECRET: ${JWT_SECRET}
  APP_NAME: ${APP_NAME}
  PROFILE: ${PROFILE}
  ENVIRONMENT: ${ENVIRONMENT}
  TZ: ${TZ:-America/Sao_Paulo}
  WALLET_USER: ${WALLET_USER}
  WALLET_PASS: ${WALLET_PASS}
  MANAGEMENT_OTLP_ENDPOINT: ${MANAGEMENT_OTLP_ENDPOINT}

services:
  # ======================================================================
  # 1. BANCO DE DADOS (POSTGRESQL)
  # ======================================================================
  postgres:
    image: postgres:15.3-alpine
    container_name: cont-wallet-postgres
    restart: unless-stopped
    # O comando inicia o postgres e injeta as configurações necessárias
    command: 
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - max_connections=20
    environment:
      <<: *wallet-variables
      POSTGRES_DB: wallet_db
      POSTGRES_USER: ${WALLET_USER}
      POSTGRES_PASSWORD: ${WALLET_PASS}
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 640M
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WALLET_USER} -d wallet_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallet_network

  # ======================================================================
  # 2. COLETORES DE DADOS (JAEGER E LOKI)
  # ======================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: cont-wallet-jaeger
    restart: unless-stopped
    environment:
      <<: *wallet-variables
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "14269:14269"
    volumes:
      - jaeger_tracing_data:/var/lib/jaeger
    networks:
      - wallet_network

  loki:
    image: grafana/loki:2.9.0
    container_name: cont-wallet-loki
    restart: unless-stopped
    environment:
      <<: *wallet-variables
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - wallet_network

  # ======================================================================
  # 3. OPEN TELEMETRY COLLECTOR
  # ======================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: cont-wallet-otel-collector
    restart: unless-stopped
    environment:
      <<: *wallet-variables
      APP_NAME: ${APP_NAME}
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - wallet_network

  # ======================================================================
  # 4. MONITORAMENTO (PROMETHEUS E GRAFANA)
  # ======================================================================
  prometheus:
    image: prom/prometheus
    container_name: cont-wallet-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    networks:
      - wallet_network

  grafana:
    image: grafana/grafana:10.2.3
    container_name: cont-wallet-grafana
    restart: unless-stopped
    environment:
      <<: *wallet-variables
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - wallet_network

  # ======================================================================
  # 5. APLICAÇÃO WALLET SERVICE
  # ======================================================================
  wallet-service-api:
    image: ${APP_NAME}:${APP_VERSION:-latest}
    build: .
    container_name: cont-${APP_NAME}
    restart: unless-stopped
    environment:
      <<: *wallet-variables
      SPRING_CLOUD_VAULT_ENABLED: "true"
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root
      SPRING_CLOUD_VAULT_KV_ENABLED: "true"
      SPRING_CLOUD_VAULT_KV_BACKEND: secret
      SPRING_CLOUD_VAULT_KV_APPLICATION_NAME: ${APP_NAME}
      SPRING_CLOUD_VAULT_KV_PROFILES: ${PROFILE}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${MANAGEMENT_OTLP_ENDPOINT}/traces
      MANAGEMENT_OTLP_LOGGING_ENDPOINT: ${MANAGEMENT_OTLP_ENDPOINT}/logs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: ${MANAGEMENT_OTLP_ENDPOINT}/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,loggers,prometheus,metrics,caches,cache,threaddump,httpexchanges"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10 
      start_period: 60s
    volumes:
      - wallet_service_data:/app/data
      - wallet_service_logs:/app/logs
      - ./data/seed:/app/data/seed:ro
      ##- ./security-matchers.yml:/app/config/security-matchers.yml:ro
      - type: bind
        source: ./security-matchers.yml
        target: /app/config/security-matchers.yml
        read_only: true
    networks:
      - wallet_network

  # ======================================================================
  # UTILITÁRIOS
  # ======================================================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: cont-wallet-pgadmin4
    restart: unless-stopped
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PGADMIN_DEFAULT_EMAIL: admin@postgres.com
      PGADMIN_DEFAULT_PASSWORD: ${WALLET_PASS}
    networks:
      - wallet_network

  runner-act:
    image: catthehacker/ubuntu:act-20.04
    container_name: cont-wallet-runner-act
    restart: "no"
    tty: true
    stdin_open: true
    volumes:
      - runner_act_data:/var/lib/runner_act/data
    networks:
      - wallet_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cont-wallet-cadvisor
    privileged: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    ports:
      - "8085:8080"
    command:
      - "-docker_only=true"
      - "-housekeeping_interval=15s"
      - "-disable_metrics=disk,diskIO,process"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    networks:
      - wallet_network

  # VAULT - GERENCIAMENTO DE SEGREDOS
  vault:
    image: hashicorp/vault:1.15
    container_name: cont-wallet-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      VAULT_DEV_ROOT_TOKEN_ID: "root"
    command: ["vault", "server", "-dev", "-dev-listen-address=0.0.0.0:8200", "-dev-root-token-id=root"]
    healthcheck:
      test: ["CMD-SHELL", "export VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN=root && vault status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wallet_network

  # ======================================================================
  # 7. TEMPO - TRACING BACKEND
  # ======================================================================
  tempo:
    image: grafana/tempo:latest
    container_name: cont-wallet-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    command: >
      -config.file=/etc/tempo.yaml
      -target=all
      -storage.trace.backend=local
      -storage.trace.local.path=/tmp/tempo/traces
    volumes:
      - ./grafana-tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_traces:/tmp/tempo/traces
    networks:
      - wallet_network

  # ======================================================================
  # SONAR QUBE
  # ======================================================================
  sonarqube:
    image: sonarqube:10-community
    container_name: cont-wallet-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - wallet_network

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cont-wallet-postgres-exporter
    restart: unless-stopped
    environment:
      <<: *wallet-variables
      DATA_SOURCE_NAME: "postgresql://wallet_pass@postgres:${WALLET_PASS}@postgres:5432/wallet_db?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - wallet_network


  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped
    networks:
      - wallet_network

# ======================================================================
# VOLUMES (todos usados)
# ======================================================================
volumes:
  postgres_data:
  jaeger_tracing_data:
  loki_data:
  grafana_data:
  tempo_traces:
  wallet_service_data:
  wallet_service_logs:
  pgadmin_data:
  runner_act_data:
  sonarqube_data:
  sonarqube_extensions:

# ======================================================================
# NETWORK (não externa pra evitar “lixo” e depender de criação manual)
# ======================================================================
networks:
  wallet_network:
    name: network_wallet
    driver: bridge